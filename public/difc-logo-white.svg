<svg width="248" height="80" viewBox="0 0 248 80" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- DIFC wordmark text rendered in white for dark backgrounds -->
<text x="10" y="58" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="6">DIFC</text>
<!-- Gradient accent underline bar -->
<rect x="10" y="66" width="220" height="4" rx="2" fill="url(#difc_grad)"/>
<defs>
  <linearGradient id="difc_grad" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
    <stop stop-color="#661FFD"/>
    <stop offset="1" stop-color="#63FF91"/>
  </linearGradient>
</defs>
</svg>
